name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g. 1.0.0)
        required: true
      branch:
        description: Branch to build from
        required: true
        default: main
      message:
        description: Release notes
        required: true
      prerelease:
        description: Mark as pre-release
        type: boolean
        default: true

env:
  BUILDBOT: https://buildbot.libretro.com/nightly/android/latest
  CORES: >-
    fbneo gambatte genesis_plus_gx handy mame2003_plus mednafen_ngp
    mednafen_pce_fast mednafen_vb mednafen_wswan mgba nestopia pcsx_rearmed
    pokemini prosystem snes9x stella swanstation

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # --- АВТОГЕНЕРАЦІЯ KEYSTORE (лише при першому запуску) ---
      - name: Ensure keystore exists (auto-generate on first run)
        run: |
          mkdir -p keystore
          if [ -f keystore/release.keystore ] && [ -f keystore/password.txt ]; then
            echo "Keystore вже існує у репозиторії, використовую наявний."
          else
            echo "Keystore не знайдено — генерую новий (перший запуск)."
            PASS=$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9' | cut -c1-20)
            ALIAS="release"
            keytool -genkeypair -v -keystore keystore/release.keystore \
              -alias "$ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=Cannoli, OU=Dev, O=Cannoli, L=Kyiv, S=Kyiv, C=UA"

            {
              echo "KEYSTORE_PASSWORD=$PASS"
              echo "KEY_PASSWORD=$PASS"
              echo "KEY_ALIAS=$ALIAS"
            } > keystore/password.txt

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add keystore/release.keystore keystore/password.txt
            git commit -m "chore: auto-generate release keystore [skip ci]"
            git push origin HEAD:${{ inputs.branch }}
          fi

      - name: Load signing credentials
        id: creds
        run: |
          source keystore/password.txt
          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"
          echo "storepass=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "keypass=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"
      # --- КІНЕЦЬ БЛОКУ KEYSTORE ---

      - name: Download libretro cores
        run: |
          for arch in arm64-v8a armeabi-v7a; do
            dir="app/src/main/jniLibs/${arch}"
            mkdir -p "$dir"
            for core in $CORES; do
              name="${core}_libretro_android.so"
              echo "Downloading ${arch}/${name}"
              curl -sL "${BUILDBOT}/${arch}/${name}.zip" -o /tmp/core.zip
              unzip -o -q /tmp/core.zip -d "$dir"
              rm /tmp/core.zip
            done
          done

      - uses: android-actions/setup-android@v3

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - uses: oven-sh/setup-bun@v2

      - name: Build Kitchen frontend
        run: |
          git clone https://github.com/CannoliHQ/kitchen.git /tmp/kitchen
          (cd /tmp/kitchen && bun install --frozen-lockfile && bun run build)
          mkdir -p app/src/main/assets/kitchen
          cp -r /tmp/kitchen/dist/* app/src/main/assets/kitchen/

      - name: Fetch RetroArch autoconfig cfgs
        run: ./scripts/fetch-autoconfig.sh

      - name: Compute version code and patch build.gradle.kts
        run: |
          VERSION="${{ inputs.version }}"
          BASE="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          if [[ "$VERSION" == *-* ]]; then
            SUFFIX="${VERSION#*-}"
            PRE="${SUFFIX##*.}"
            [[ "$PRE" =~ ^[0-9]+$ ]] || PRE=1
            (( PRE > 98 )) && PRE=98
          else
            PRE=99
          fi
          VERSION_CODE=$(( ${MAJOR:-0} * 1000000 + ${MINOR:-0} * 10000 + ${PATCH:-0} * 100 + PRE ))
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ inputs.version }}\"/" app/build.gradle.kts
          echo "versionCode=$VERSION_CODE, versionName=${{ inputs.version }}"

      - name: Build release APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore/release.keystore \
            -Pandroid.injected.signing.store.password=${{ steps.creds.outputs.storepass }} \
            -Pandroid.injected.signing.key.alias=${{ steps.creds.outputs.alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.creds.outputs.keypass }}

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "apk_name=cannoli-${{ inputs.version }}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ inputs.message }}
          prerelease: ${{ inputs.prerelease }}
          target_commitish: ${{ inputs.branch }}
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
